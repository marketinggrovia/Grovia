<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grovia Marketing - Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <img src="logo.jpeg" alt="Grovia" class="login-logo">
            <h2>Admin Panel</h2>
            <p>Enter password to access the dashboard</p>
            <div class="login-field">
                <input type="password" id="loginPassword" placeholder="Enter Password" onkeydown="if(event.key==='Enter')attemptLogin()">
            </div>
            <button onclick="attemptLogin()" class="login-btn">Sign In <i class="fas fa-arrow-right"></i></button>
            <p class="login-hint">Default: <code>grovia2026</code></p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div id="dashboard" class="dashboard hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="logo.jpeg" alt="Grovia" width="36" height="36">
                <span>Grovia Admin</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-link active" data-section="hero"><i class="fas fa-home"></i> Hero Section</a>
                <a href="#" class="sidebar-link" data-section="general"><i class="fas fa-globe"></i> General</a>
                <a href="#" class="sidebar-link" data-section="about"><i class="fas fa-info-circle"></i> About</a>
                <a href="#" class="sidebar-link" data-section="services"><i class="fas fa-cogs"></i> Services</a>
                <a href="#" class="sidebar-link" data-section="whyus"><i class="fas fa-star"></i> Why Choose Us</a>
                <a href="#" class="sidebar-link" data-section="portfolio"><i class="fas fa-briefcase"></i> Portfolio</a>
                <a href="#" class="sidebar-link" data-section="testimonials"><i class="fas fa-quote-right"></i> Testimonials</a>
                <a href="#" class="sidebar-link" data-section="blogs"><i class="fas fa-newspaper"></i> Blog Posts</a>
                <a href="#" class="sidebar-link" data-section="seo"><i class="fas fa-search"></i> SEO Settings</a>
                <a href="#" class="sidebar-link" data-section="careers"><i class="fas fa-briefcase"></i> Careers Page</a>
                <a href="#" class="sidebar-link" data-section="faq"><i class="fas fa-question-circle"></i> FAQ Section</a>
                <a href="#" class="sidebar-link" data-section="socialFeed"><i class="fab fa-instagram"></i> Instagram Feed</a>
                <a href="#" class="sidebar-link" data-section="socials"><i class="fas fa-share-nodes"></i> Social Media</a>
                <a href="#" class="sidebar-link" data-section="contact"><i class="fas fa-envelope"></i> Contact</a>
                <a href="#" class="sidebar-link" data-section="footer"><i class="fas fa-columns"></i> Footer</a>
                <a href="#" class="sidebar-link" data-section="settings"><i class="fas fa-lock"></i> Security</a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" target="_blank" class="sidebar-link"><i class="fas fa-external-link-alt"></i> View Site</a>
                <a href="#" class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 id="sectionTitle">Hero Section</h1>
                <div class="topbar-actions">
                    <button class="btn-secondary" onclick="resetSection()"><i class="fas fa-undo"></i> Reset Section</button>
                    <button class="btn-primary" onclick="saveAll()"><i class="fas fa-save"></i> Save Changes</button>
                </div>
            </header>

            <div class="content-area" id="contentArea">
                <!-- Dynamically loaded -->
            </div>
        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="defaults.js"></script>
    <script src="admin.js"></script>
</body>
</html>
